<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vinyl Playlist</title>
    <link rel="shortcut icon" href="./Images/music_record_3843.ico" type="image/x-icon">
    <link rel="stylesheet" href="./Styles/music.css">
</head>
<body>

    <div class="reproductor">
        <div class="visor-disco">
            <div class="disco-container" id="discoCont">
                <div class="vinilo">
                    <div class="surcos"></div>
                    <div class="etiqueta">
                        <img src="" alt="Portada" class="foto-etiqueta" id="portada">
                        <div class="capa-oscura"></div>
                        <div class="texto-etiqueta">
                            <p class="artista" id="artistaC">ARTISTA</p>
                            <h2 class="titulo" id="tituloC">---</h2>
                        </div>
                        <div class="agujero"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controles">
            <button id="btnPrev" class="btn-secundario">PREV</button>
            <button id="btnPlay" class="btn-principal">PLAY</button>
            <button id="btnNext" class="btn-secundario">NEXT</button>
        </div>
        <p id="estado">READY</p>
    </div>

    <script src="music.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito', reg))
                    .catch(err => console.error('Error al registrar el Service Worker', err));
            });
        }
    </script>
</body>
</html>
